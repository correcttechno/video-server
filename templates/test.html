<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Drone Attitude Indicator</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #00050a;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .pfd {
            width: 1220px;
            height: 720px;
            background: linear-gradient(#0b121a, #05080f);
            border: 22px solid #1a2a3a;
            border-radius: 20px;
            box-shadow: 0 0 90px rgba(0, 255, 200, 0.5),
                inset 0 0 120px rgba(0, 0, 0, 0.97);
            position: relative;
            overflow: hidden;
        }

        .attitude-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            border: 24px solid #c0d8ff;
            border-radius: 50%;
            background: #0a0f17;
            box-shadow: 0 0 70px #00ffcc,
                inset 0 0 80px rgba(255, 255, 255, 0.15);
            overflow: hidden;
        }

        .sky-ground {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #001833 50%, #2f2118 50%);
            z-index: 1;
        }

        .ground-detail {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: repeating-linear-gradient(40deg, rgba(90, 110, 60, 0.35) 0px, rgba(90, 110, 60, 0.35) 14px, transparent 14px, transparent 30px);
        }

        .moving-layer {
            position: absolute;
            width: 100%;
            height: 500%;
            top: -200%;
            z-index: 2;
            transition: transform 0.08s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .horizon-line {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, transparent, #ffee88 30%, #ffee88 70%, transparent);
            box-shadow: 0 0 30px #ffee00;
        }

        .pitch-scale {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0 45px;
            color: #fff;
        }

        .pitch-line {
            height: 22px;
            position: relative;
        }

        .pitch-line::before {
            content: '';
            position: absolute;
            left: 48px;
            right: 48px;
            height: 2px;
            background: #fff;
        }

        .pitch-line.major::before {
            height: 4px;
            background: #ffee88;
        }

        .pitch-line span {
            position: absolute;
            left: 0;
        }

        .aircraft-symbol {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: yellow;
            z-index: 10;
        }

        .data {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            color: #0ff;
            font-size: 24px;
            border: 2px solid #0ff;
            border-radius: 10px;
        }

        .roll-data {
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .pitch-data {
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
        }

        .heading {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #0ff;
        }

        .status {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #0f0;
        }
    </style>
</head>

<body>

    <div class="pfd">

        <div class="attitude-container">
            <div class="sky-ground"></div>

            <div class="moving-layer" id="movingLayer">
                <div class="horizon-line"></div>
                <div class="pitch-scale" id="pitchScale"></div>
            </div>

            <div class="aircraft-symbol">✈</div>
        </div>

        <div class="data roll-data">ROLL <span id="rollValue">0</span>°</div>
        <div class="data pitch-data">PITCH <span id="pitchValue">0</span>°</div>
        <div class="heading">YAW <span id="headingValue">0</span>°</div>
        <div class="status" id="status">Bağlanıyor...</div>

    </div>

    <script>
        let roll = 0, pitch = 0, yaw = 0;
        let ws;

        const movingLayer = document.getElementById('movingLayer');
        const rollEl = document.getElementById('rollValue');
        const pitchEl = document.getElementById('pitchValue');
        const headingEl = document.getElementById('headingValue');
        const statusEl = document.getElementById('status');
        const pitchScale = document.getElementById('pitchScale');

        function createPitchScale() {
            let html = '';
            for (let i = 40; i >= -40; i -= 5) {
                html += `<div class="pitch-line ${i % 10 === 0 ? 'major' : ''}">
                    <span>${i}</span>
                </div>`;
            }
            pitchScale.innerHTML = html;
        }

        function normalizeYaw(rad) {
            let deg = rad * (180 / Math.PI);

            // -180 ile +180 arası normalize
            deg = ((deg + 180) % 360 + 360) % 360 - 180;

            return deg;
        }

        function updateUI() {
            movingLayer.style.transform =
                `rotate(${-roll}deg) translateY(${pitch * 6}px)`;

            rollEl.textContent = roll.toFixed(1);
            pitchEl.textContent = pitch.toFixed(1);

            const yawDeg = normalizeYaw(yaw);
            headingEl.textContent = yawDeg.toFixed(0);
        }

        function connectWebSocket() {
            ws = new WebSocket("ws://video.correcttechno.com:2086");

            ws.onopen = () => {
                statusEl.textContent = "Bağlandı";
            };

            ws.onmessage = (e) => {
                try {
                    let data = JSON.parse(e.data);
                    data = data.data;

                    if (data.attitude) {
                        roll = data.attitude.roll || 0;
                        pitch = data.attitude.pitch || 0;
                        yaw = data.attitude.yaw || 0;

                        updateUI();
                    }
                } catch { }
            };

            ws.onclose = () => {
                statusEl.textContent = "Yeniden bağlanıyor...";
                setTimeout(connectWebSocket, 2000);
            };
        }

        window.onload = () => {
            createPitchScale();
            connectWebSocket();
        };
    </script>

</body>

</html>
