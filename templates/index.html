<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Drone HUD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body,
        html {
            margin: 0;
            height: 100%;
            background: black;
            color: #0f0;
            font-family: monospace;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #videoFeed {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* HUD */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* TEK PANEL */
        .panel {
            position: absolute;
            top: 10px;
            left: 10px;
            border: 1px solid lime;
            padding: 15px;
            background: rgba(0, 20, 0, 0.7);
            border-radius: 6px;
            font-size: 14px;
            min-width: 220px;
        }

        /* compass */
        #compass {
            position: absolute;
            top: 50%;
            right: 20px;
            font-size: 40px;
            transform: translateY(-50%);
        }

        /* joystick */
        .stick {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid lime;
            border-radius: 50%;
        }

        #stickL {
            bottom: 100px;
            left: 50px;
        }

        #stickR {
            bottom: 100px;
            right: 50px;
        }

        .dot {
            width: 20px;
            height: 20px;
            background: lime;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            left: 30px;
        }

        #map {
            position: absolute;
            bottom: 0px;
            right: 0px;
            height: 20%;
            width: 20%;
        }



        .pfd {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 500px;
            height: 540px;
            overflow: hidden;
        }

        .attitude-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 10px solid #c0d8ff;
            border-radius: 50%;
            background: #0a0f17;

            overflow: hidden;
        }

        .sky-ground {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #001833 50%, #2f2118 50%);
            z-index: 1;
        }

        .ground-detail {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: repeating-linear-gradient(40deg, rgba(90, 110, 60, 0.35) 0px, rgba(90, 110, 60, 0.35) 14px, transparent 14px, transparent 30px);
        }

        .moving-layer {
            position: absolute;
            width: 100%;
            height: 500%;
            top: -200%;
            z-index: 2;
            transition: transform 0.08s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .horizon-line {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, transparent, #ffee88 30%, #ffee88 70%, transparent);
            box-shadow: 0 0 30px #ffee00;
        }

        .pitch-scale {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0 45px;
            color: #fff;
        }

        .pitch-line {
            height: 22px;
            position: relative;
        }

        .pitch-line::before {
            content: '';
            position: absolute;
            left: 48px;
            right: 48px;
            height: 2px;
            background: #fff;
        }

        .pitch-line.major::before {
            height: 4px;
            background: green;
        }

        .pitch-line span {
            position: absolute;
            left: 0;
        }

        .aircraft-symbol {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: yellow;
            z-index: 10;
        }

        .data {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            color: #0ff;
            font-size: 24px;
            border: 2px solid #0ff;
            border-radius: 10px;
        }

        .roll-data {
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .pitch-data {
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .heading {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #0ff;
        }

        .status {
            position: absolute;
            top: 10px;
            left: 0;
            color: #0f0;
        }


        .compass {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #333;
            background: radial-gradient(circle, #111 60%, #000);
            box-shadow: 0 0 15px #00ffcc33;
            overflow: hidden;
            position: absolute;
            bottom:400px;
            left:400px;
        }

        .dial {
            width: 100%;
            height: 100%;
            position: absolute;
            transform: rotate(0deg);
            transition: transform 0.15s linear;
        }

        .arrow {
            position: absolute;
            width: 2px;
            height: 40px;
            background: red;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .direction {
            position: absolute;
            font-size: 10px;
            color: #00ffcc;
            font-weight: bold;
        }

        /* istiqamətlər */
        .N {
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
        }

        .S {
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
        }

        .E {
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        .W {
            left: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        .value {
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="video-container">
        <img id="videoFeed" src="/mjpeg">

        <div class="overlay">

            <!-- TEK PANEL -->
            <div class="panel">
                <b>FLIGHT</b><br>
                Roll: <span id="roll">0</span><br>
                Pitch: <span id="pitch">0</span><br>
                Yaw: <span id="yaw">0</span><br><br>

                <b>GPS</b><br>
                Lat: <span id="lat">0</span><br>
                Lon: <span id="lon">0</span><br>
                Sats: <span id="sats">0</span><br>
                Fix: <span id="fix">0</span><br><br>

                <b>SYSTEM</b><br>
                Battery: <span id="battery">N/A</span><br>
                Voltage: <span id="voltage">0</span><br><br>

                <b>GAMEPAD</b><br>
                LX: <span id="lx">0</span><br>
                LY: <span id="ly">0</span><br>
                RX: <span id="rx">0</span><br>
                RY: <span id="ry">0</span>
            </div>

            <!-- Compass -->
            <div id="map"></div>

            <!-- Joystick -->
            <div id="stickL" class="stick" style="display:none;">
                <div class="dot"></div>
            </div>
            <div id="stickR" class="stick" style="display:none;">
                <div class="dot"></div>
            </div>


            <div class="pfd">

                <div class="attitude-container">
                    <div class="sky-ground"></div>

                    <div class="moving-layer" id="movingLayer">
                        <div class="horizon-line"></div>
                        <div class="pitch-scale" id="pitchScale"></div>
                    </div>

                    <div class="aircraft-symbol">✈</div>
                </div>

                <div class="data roll-data">ROLL <span id="rollValue">0</span>°</div>
                <div class="data pitch-data">PITCH <span id="pitchValue">0</span>°</div>
                <div class="heading">YAW <span id="headingValue">0</span>°</div>
                <div class="status" id="status">Bağlanıyor...</div>

            </div>

            <div class="compass">
                <div class="dial" id="dial">
                    <div class="direction N">N</div>
                    <div class="direction S">S</div>
                    <div class="direction E">E</div>
                    <div class="direction W">W</div>
                </div>
                <div class="arrow"></div>
            </div>

        </div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let ws;
        let prevAxes = [];
        const threshold = 0.02;

        // WebSocket
        function connectWS() {
            ws = new WebSocket("ws://video.correcttechno.com:2086");

            ws.onopen = () => {
                statusEl.textContent = "Bağlandı";
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type !== "telemetry") return;

                const d = msg.data;
                console.log(d);

                updatePosition(d.gps.lat, d.gps.lon);
                // FLIGHT
                document.getElementById("roll").innerText = d.attitude.roll.toFixed(2);
                document.getElementById("pitch").innerText = d.attitude.pitch.toFixed(2);
                document.getElementById("yaw").innerText = d.attitude.yaw.toFixed(2);

                // GPS
                document.getElementById("lat").innerText = d.gps.lat.toFixed(6);
                document.getElementById("lon").innerText = d.gps.lon.toFixed(6);
                document.getElementById("sats").innerText = d.gps.sats;
                document.getElementById("fix").innerText = d.gps.fix;

                // SYSTEM
                document.getElementById("battery").innerText =
                    d.battery.percent >= 0 ? d.battery.percent + "%" : "N/A";

                document.getElementById("voltage").innerText = d.battery.voltage;

                // COMPASS
                /*   let heading = d.mag.heading || d.attitude.yaw;
                  document.getElementById("compass").style.transform =
                      `translateY(-50%) rotate(${heading}deg)`; */

                try {
                    let data = JSON.parse(e.data);
                    data = data.data;

                    if (data.attitude) {
                        roll = data.attitude.roll || 0;
                        pitch = data.attitude.pitch || 0;
                        yaw = data.attitude.yaw || 0;

                        updateUI();
                        updateYaw(yaw);
                    }
                } catch { }
            };
        }

        connectWS();

        window.onload = () => {
            createPitchScale();

        };

        // joystick movement
        function moveStick(id, x, y) {
            const dot = document.querySelector(`#${id} .dot`);
            const range = 25;

            dot.style.left = (30 + x * range) + "px";
            dot.style.top = (30 + y * range) + "px";
        }

        // gamepad
        function gameLoop() {
            const gp = navigator.getGamepads()[0];

            if (gp) {
                let axes = gp.axes;

                // ekranda göstər
                document.getElementById("lx").innerText = axes[0].toFixed(2);
                document.getElementById("ly").innerText = axes[1].toFixed(2);
                document.getElementById("rx").innerText = axes[2].toFixed(2);
                document.getElementById("ry").innerText = axes[3].toFixed(2);

                moveStick("stickL", axes[0], axes[1]);
                moveStick("stickR", axes[2], axes[3]);

                let changed = false;
                axes.forEach((val, i) => {
                    if (prevAxes[i] === undefined || Math.abs(prevAxes[i] - val) > threshold) {
                        changed = true;
                    }
                });

                if (changed && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: "gamepad",
                        axes: [...axes]
                    }));

                    prevAxes = [...axes];
                }
            }

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener("gamepadconnected", gameLoop);


        // başlangıç koordinat (Baku)
        let currentPos = [40.452091, 50.065797];

        // map init
        const map = L.map('map').setView(currentPos, 13);

        // OpenStreetMap layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // marker
        let marker = L.marker(currentPos).addTo(map)
            .bindPopup("Real-time Device")
            .openPopup();

        // UPDATE FUNCTION
        function updatePosition(lat, lng) {
            currentPos = [lat, lng];

            marker.setLatLng(currentPos);
            map.setView(currentPos);
        }


        let roll = 0, pitch = 0, yaw = 0;


        const movingLayer = document.getElementById('movingLayer');
        const rollEl = document.getElementById('rollValue');
        const pitchEl = document.getElementById('pitchValue');
        const headingEl = document.getElementById('headingValue');
        const statusEl = document.getElementById('status');
        const pitchScale = document.getElementById('pitchScale');

        function createPitchScale() {
            let html = '';
            for (let i = 40; i >= -40; i -= 5) {
                html += `<div class="pitch-line ${i % 10 === 0 ? 'major' : ''}">
                    <span>${i}</span>
                </div>`;
            }
            pitchScale.innerHTML = html;
        }

        function normalizeYaw(rad) {
            let deg = rad * (180 / Math.PI);

            // -180 ile +180 arası normalize
            deg = ((deg + 180) % 360 + 360) % 360 - 180;

            return deg;
        }

        function updateUI() {
            movingLayer.style.transform =
                `rotate(${-roll}deg) translateY(${pitch * 6}px)`;

            rollEl.textContent = roll.toFixed(1);
            pitchEl.textContent = pitch.toFixed(1);

            const yawDeg = normalizeYaw(yaw);
            headingEl.textContent = yawDeg.toFixed(0);
        }


        let current = 0;
        let targetHeading = 0;

        // -180 → +180  →  0 → 360
        function yawToHeading(yaw) {
            return (yaw + 360) % 360;
        }

        // 🔥 TƏK animation loop
        function animate() {
            let diff = targetHeading - current;

            // shortest path
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;

            current += diff * 0.15;

            document.getElementById("dial").style.transform =
                `rotate(${-current}deg)`;

            requestAnimationFrame(animate);
        }

        // update funksiyası
        function updateYaw(yaw) {
            targetHeading = yawToHeading(yaw);

            document.getElementById("val").innerText =
                `Yaw: ${yaw.toFixed(1)}° | Heading: ${targetHeading.toFixed(1)}°`;
        }

        // başlat
        animate();

    </script>

</body>

</html>
