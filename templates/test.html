<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Military Drone HUD Interface</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Share Tech Mono', monospace;
    background-color: #000;
    color: #0f0;
    overflow: hidden;
}

.video-container {
    position: relative;
    width: 100%;
    height: 100%;
}

#videoFeed {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.9) contrast(1.2);
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* Tabs panel */
.tabs {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 300px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #0f0;
    border-radius: 5px;
    pointer-events: auto;
    overflow: hidden;
}

.tab-buttons {
    display: flex;
}

.tab-buttons button {
    flex: 1;
    padding: 8px;
    background: #000;
    border: none;
    color: #0f0;
    cursor: pointer;
}

.tab-buttons button.active {
    background: #0a0;
    color: #fff;
}

.tab-content {
    padding: 8px;
    display: none;
    font-size: 14px;
}

.tab-content.active {
    display: block;
}

/* Gamepad style controls */
.control-buttons {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    pointer-events: auto;
    justify-content: center;
}

.control-buttons button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #0f0;
    background: rgba(0,255,0,0.1);
    color: #0f0;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
}

.control-buttons button:hover {
    background: rgba(0,255,0,0.4);
    color: #fff;
}

/* Sensor/parametre panel */
.sensors {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 5px;
    width: 220px;
    pointer-events: none;
    font-size: 14px;
    border: 1px solid #0f0;
}

/* Map overlay */
.map-overlay {
    position: absolute;
    bottom: 15%;
    right: 2%;
    width: 240px;
    max-width: 28%;
    height: 140px;
    max-height: 22%;
    background: #002200 url('https://via.placeholder.com/240x140?text=MAP') no-repeat center center;
    background-size: cover;
    border: 1px solid #0f0;
    border-radius: 5px;
    pointer-events: auto;
}

#drone-marker {
    position: absolute;
    width: 12px;
    height: 12px;
    background: red;
    border: 2px solid #fff;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

@media (max-width: 768px) {
    .tabs { width: 180px; }
    .map-overlay { width: 180px; height: 100px; }
    .control-buttons button { width: 50px; height: 50px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="video-container">
    <img id="videoFeed" src="/mjpeg" alt="Live Drone Feed">

    <div class="overlay">
        <!-- Tabs -->
        <div class="tabs">
            <div class="tab-buttons">
                <button class="active" onclick="openTab('tab1')">FLIGHT</button>
                <button onclick="openTab('tab2')">SYSTEM</button>
            </div>
            <div id="tab1" class="tab-content active">
                <p>Altitude: <span id="altitude">0</span> m</p>
                <p>Speed: <span id="speed">0</span> km/h</p>
                <p>Heading: <span id="heading">0</span>°</p>
                <p>Flight Mode: <span id="mode">Manual</span></p>
            </div>
            <div id="tab2" class="tab-content">
                <p>Battery: <span id="battery">100%</span></p>
                <p>GPS: <span id="gps">0.0000,0.0000</span></p>
                <p>Gyro (P,R,Y): <span id="gyro">0,0,0</span></p>
                <p>Signal: <span id="signal">100%</span></p>
                <p>Temp: <span id="temp">25°C</span></p>
                <p>Motor RPM: <span id="rpm">0</span></p>
            </div>
        </div>

        <!-- Controls -->
        <div class="control-buttons">
            <button onclick="sendCommand('takeoff')">↑</button>
            <button onclick="sendCommand('forward')">▲</button>
            <button onclick="sendCommand('left')">◄</button>
            <button onclick="sendCommand('right')">►</button>
            <button onclick="sendCommand('backward')">▼</button>
            <button onclick="sendCommand('land')">✈</button>
        </div>

        <!-- Sensors -->
        <div class="sensors">
            <p>Altitude: <span id="altitude_s">0</span> m</p>
            <p>Speed: <span id="speed_s">0</span> km/h</p>
            <p>Heading: <span id="heading_s">0</span>°</p>
            <p>Battery: <span id="battery_s">100%</span></p>
            <p>Signal: <span id="signal_s">100%</span></p>
            <p>Temp: <span id="temp_s">25°C</span></p>
            <p>Motor RPM: <span id="rpm_s">0</span></p>
        </div>

        <!-- Map overlay -->
        <div class="map-overlay">
            <div id="drone-marker"></div>
        </div>

    </div>
</div>

<script>
function openTab(tabId) {
    const tabs = document.querySelectorAll('.tab-content');
    tabs.forEach(tab => tab.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');

    const buttons = document.querySelectorAll('.tab-buttons button');
    buttons.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}

function sendCommand(cmd) {
    console.log('Command sent:', cmd);
}

// Dummy live data update
setInterval(() => {
    const altitude = (Math.random()*120).toFixed(1);
    const speed = (Math.random()*80).toFixed(1);
    const heading = (Math.random()*360).toFixed(1);
    const battery = (Math.random()*100).toFixed(0);
    const signal = (Math.random()*100).toFixed(0);
    const temp = (20+Math.random()*15).toFixed(1);
    const rpm = (Math.random()*5000).toFixed(0);
    const gyro = `${(Math.random()*360).toFixed(1)}, ${(Math.random()*360).toFixed(1)}, ${(Math.random()*360).toFixed(1)}`;

    document.querySelectorAll('#altitude, #altitude_s').forEach(el=>el.innerText=altitude);
    document.querySelectorAll('#speed, #speed_s').forEach(el=>el.innerText=speed);
    document.querySelectorAll('#heading, #heading_s').forEach(el=>el.innerText=heading);
    document.querySelectorAll('#battery, #battery_s').forEach(el=>el.innerText=battery+'%');
    document.querySelectorAll('#signal, #signal_s').forEach(el=>el.innerText=signal+'%');
    document.querySelectorAll('#temp, #temp_s').forEach(el=>el.innerText=temp+'°C');
    document.querySelectorAll('#rpm, #rpm_s').forEach(el=>el.innerText=rpm);
    document.querySelectorAll('#gyro, #gyro_s').forEach(el=>el.innerText=gyro);
},1000);

// Demo map marker movement
let marker = document.getElementById('drone-marker');
let posX=50, posY=50;
setInterval(()=>{
    posX += (Math.random()-0.5)*2;
    posY += (Math.random()-0.5)*2;
    posX=Math.max(5,Math.min(95,posX));
    posY=Math.max(5,Math.min(95,posY));
    marker.style.left=posX+"%";
    marker.style.top=posY+"%";
},1000);
</script>

</body>
</html>
